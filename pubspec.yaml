name: pos_app
description: Flutter POS/ERP app for Laravel Ultimate POS.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Routing
  go_router: ^13.0.0

  # API
  dio: ^5.4.0
  retrofit: ^4.1.0
  json_annotation: ^4.8.1

  # Storage
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # DI
  get_it: ^7.6.7

  # UI
  responsive_builder: ^0.7.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  intl: ^0.19.0
  audioplayers: ^6.1.0

  # Scanning
  camera: ^0.11.0+2
  google_mlkit_text_recognition: ^0.14.0
  mobile_scanner: ^4.0.0

  # Printing / Sharing
  pdf: ^3.10.8
  printing: ^5.12.0
  share_plus: ^7.2.2
  path_provider: ^2.1.2

  # Bluetooth Printer
  # flutter_bluetooth_printer: ^2.0.0  # Uncomment when adding printer support

  # Utils
  connectivity_plus: ^7.0.0
  image_picker: ^1.1.0
  permission_handler: ^11.3.0

dependency_overrides:
  flutter_plugin_android_lifecycle: 2.0.35
  image_picker_android: 0.8.12+21
  image_picker_ios: 0.8.12+2
  connectivity_plus: 7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  retrofit_generator: ^8.1.0
  hive_generator: ^2.0.1
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
    - assets/audio/
